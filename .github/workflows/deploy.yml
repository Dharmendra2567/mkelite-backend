name: Deploy to EC2

on:
  push:
    branches:
      - main        # Triggers on push to main branch

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout Code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'          # Match your EC2 Node version
          cache: 'npm'

      # ── 3. Install & Test ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Run tests                # Remove if no tests yet
        run: npm test --if-present

      # ── 4. Deploy to EC2 via SSH ──────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/deploy/app"   # ← Change to your app directory

            echo "📦 Pulling latest code..."
            cd $APP_DIR
            git pull origin main

            echo "📥 Installing dependencies..."
            npm ci --omit=dev

            echo "🔄 Restarting app with PM2..."
            pm2 reload my-backend --update-env   # ← Match your PM2 app name

            echo "✅ Deployment complete!"

      # ── 5. Invalidate CloudFront Cache ────────────────────────────
      - name: Invalidate CloudFront cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: "us-east-1"        # ← Change to your region
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
